      epsilon: 2.0
      sigma: 1.1
  # Right wall
  - cuboid:
      position: [27.2, 0.5, 0.5]
      size: [2, 30, 12]
      velocity: [0, 0, 0]
      mass: 1.0
      distance: 1.0
      epsilon: 2.0
      sigma: 1.1
